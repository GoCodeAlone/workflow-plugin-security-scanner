version: 2

project_name: workflow-plugin-security-scanner

before:
  hooks:
    - go mod tidy
    - "sed -i.bak 's/\"version\": \".*\"/\"version\": \"{{ .Version }}\"/' plugin.json && rm -f plugin.json.bak"

builds:
  - id: default
    main: ./cmd/workflow-plugin-security-scanner
    binary: workflow-plugin-security-scanner
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X github.com/GoCodeAlone/workflow-plugin-security-scanner/internal.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - plugin.json

release:
  github:
    owner: GoCodeAlone
    name: workflow-plugin-security-scanner
  draft: false
  prerelease: false

checksum:
  name_template: "checksums.txt"
