version: 2

project_name: workflow-plugin-security-scanner

before:
  hooks:
    - GOWORK=off go mod tidy
    - "sed -i.bak -e 's/\"version\": \".*\"/\"version\": \"{{ .Version }}\"/' -e 's#/releases/download/v[^/]*/#/releases/download/v{{ .Version }}/#g' plugin.json && rm -f plugin.json.bak"

builds:
  - id: default
    main: ./cmd/workflow-plugin-security-scanner
    binary: workflow-plugin-security-scanner
    env:
      - CGO_ENABLED=0
      - GOWORK=off
      - GOPRIVATE=github.com/GoCodeAlone/*
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X github.com/GoCodeAlone/workflow-plugin-security-scanner/internal.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - plugin.json
      - plugin.contracts.json
      - LICENSE

release:
  github:
    owner: GoCodeAlone
    name: workflow-plugin-security-scanner
  draft: false
  prerelease: false

checksum:
  name_template: "checksums.txt"
